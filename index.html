function getW(a,b){return a>b?'A':b>a?'B':'D';}
function calcPts(real,guess){
  if(!real||!guess)return 0;
  var ra=real.sa,rb=real.sb,ga=guess.sa,gb=guess.sb;
  if(ra===null||rb===null||ga===null||gb===null)return 0;
  if(ra===ga&&rb===gb)return 5;
  if(getW(ra,rb)!==getW(ga,gb))return 0;
  if(Math.abs(ra-rb)===Math.abs(ga-gb))return 4;
  return 2;
}

<script>
var h=React.createElement;
var useState=React.useState;
var useEffect=React.useEffect;
var useMemo=React.useMemo;
var useCallback=React.useCallback;

// ── ESPN Hook — fetches live scores, standings, AND scorers from goal details ──
function useESPN(){
  var s1=useState([]);   var espnEvents=s1[0],setEvents=s1[1];
  var s2=useState([]);   var scorers=s2[0],setScorers=s2[1];
  var s3=useState({});   var standings=s3[0],setStandings=s3[1];
  var s4=useState(null); var lastUp=s4[0],setLastUp=s4[1];
  // scorers built from goal events across all matches
  var s5=useState({});   var goalMap=s5[0],setGoalMap=s5[1]; // name->goals

  var fetchScores=useCallback(function(){
    // Fetch all group stage matches with a broad date range
    var today=new Date();
    var dd=String(today.getDate()).padStart(2,'0');
    var mm=String(today.getMonth()+1).padStart(2,'0');
    var yyyy=today.getFullYear();
    var todayStr=yyyy+mm+dd;
    fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=100&dates=20260611-'+todayStr)
    .then(function(r){return r.json();})
    .then(function(d){
      var gmap={};
      var evts=(d.events||[]).map(function(e){
        var comp=(e.competitions||[])[0]||{};
        var comps=comp.competitors||[];
        var home=comps.find(function(t){return t.homeAway==='home';})||comps[0]||{};
        var away=comps.find(function(t){return t.homeAway==='away';})||comps[1]||{};
        var st=(comp.status||{}).type||{};
        var sn=st.name||'';
        // extract goal scorers from details
        (comp.details||[]).forEach(function(det){
          if(det.type&&(det.type.text==='Goal'||det.type.id==='goal'||det.type.name==='goal')){
            var athls=det.athletesInvolved||[];
            if(athls.length>0){
              var nm=athls[0].displayName||athls[0].fullName||'';
              var team=det.team&&(EM[det.team.displayName]||det.team.displayName)||'';
              if(nm){
                if(!gmap[nm]) gmap[nm]={name:nm,team:team,goals:0};
                gmap[nm].goals++;
              }
            }
          }
        });
        return{
          id:e.id,
          homeTeam:norm(home.team&&home.team.displayName||''),
          awayTeam:norm(away.team&&away.team.displayName||''),
          homeLogo:(home.team&&home.team.logo)||'',
          awayLogo:(away.team&&away.team.logo)||'',
          homeColor:(home.team&&home.team.color)||'1a3a8a',
          awayColor:(away.team&&away.team.color)||'1a3a8a',
          homeScore:parseInt(home.score||'0'),
          awayScore:parseInt(away.score||'0'),
          homeWin:!!home.winner,
          awayWin:!!away.winner,
          clock:(comp.status&&comp.status.displayClock)||'',
          period:(comp.status&&comp.status.period)||0,
          isLive:sn==='STATUS_IN_PROGRESS',
          isHalf:sn==='STATUS_HALFTIME',
          isFinal:sn==='STATUS_FINAL'||sn==='STATUS_FULL_TIME'||sn==='STATUS_END_PERIOD',
          isPre:sn==='STATUS_SCHEDULED',
          statusDetail:st.shortDetail||'',
          date:e.date||''
        };
      });
      setEvents(evts);
      setLastUp(new Date());
      // Update goal map
      if(Object.keys(gmap).length>0){
        setGoalMap(function(prev){
          var merged=Object.assign({},prev);
          Object.keys(gmap).forEach(function(k){merged[k]=gmap[k];});
          return merged;
        });
      }
    }).catch(function(e){console.warn('ESPN scoreboard:',e);});
  },[]);

  var fetchStandings=useCallback(function(){
    fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings')
    .then(function(r){return r.json();})
    .then(function(d){
      var s={};
      (d.standings||[]).forEach(function(grp){
        var gn=(grp.name||'').replace(/Group /i,'').replace(/Grupo /i,'').trim();
        if(!gn||gn.length>2)return;
        s[gn]=(grp.entries||[]).map(function(e){
          function sv(n){var x=(e.stats||[]).find(function(x){return x.name===n;});return x?x.value:0;}
          return{team:norm(e.team&&e.team.displayName||e.team&&e.team.name||''),logo:e.team&&e.team.logo||'',played:sv('gamesPlayed'),wins:sv('wins'),draws:sv('ties'),losses:sv('losses'),gf:sv('pointsFor'),ga:sv('pointsAgainst'),pts:sv('points')};
        });
      });
      setStandings(s);
    }).catch(function(){});
  },[]);

  // Build top 5 scorers list from goalMap
  var topScorers=useMemo(function(){
    return Object.values(goalMap).filter(function(x){return x.goals>0;}).sort(function(a,b){return b.goals-a.goals;}).slice(0,5);
  },[goalMap]);

  useEffect(function(){
    // Immediate fetch of all group stage results (wide date range)
    fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=100&dates=20260611-20260627')
    .then(function(r){return r.json();})
    .then(function(d){
      // Process all events from this full-range fetch
      var allEvts=(d.events||[]);
      allEvts.forEach(function(e){
        var comp=(e.competitions||[])[0]||{};
        var comps=comp.competitors||[];
        var home=comps.find(function(t){return t.homeAway==='home';})||comps[0]||{};
        var away=comps.find(function(t){return t.homeAway==='away';})||comps[1]||{};
        var st=((comp.status||{}).type||{}).name||'';
        var isFin=st==='STATUS_FINAL'||st==='STATUS_FULL_TIME'||st==='STATUS_END_PERIOD';
        if(!isFin||!_db)return;
        var ha=norm(home.team&&home.team.displayName||'');
        var aa=norm(away.team&&away.team.displayName||'');
        var m=MATCH_LIST.find(function(m){return m.team_a===ha&&m.team_b===aa;});
        if(!m)return;
        _db.ref('results/'+fbkey(mkey(m))).set({sa:parseInt(home.score||'0'),sb:parseInt(away.score||'0')});
      });
    }).catch(function(){});
    fetchScores();fetchStandings();
    var t1=setInterval(fetchScores,30000);
    var t2=setInterval(fetchStandings,120000);
    return function(){clearInterval(t1);clearInterval(t2);};
  },[]);

  return{espnEvents:espnEvents,scorers:topScorers,standings:standings,lastUp:lastUp};
}

// ── Main App ──────────────────────────────────────────────────────────────────
function BolaoApp(){
  var s1=useState({});      var results=s1[0],setResults=s1[1];
  var s2=useState('ranking'); var tab=s2[0],setTab=s2[1];
  var s3=useState('TODAY'); var rFilter=s3[0],setRFilter=s3[1];
  var s4=useState('ALL');   var gFilter=s4[0],setGFilter=s4[1]; // guesses tab filter
  var s9=useState('ok');    var dbSt=s9[0],setDbSt=s9[1];

  var espn=useESPN();
  var espnEvents=espn.espnEvents;
  var scorers=espn.scorers;
  var espnStandings=espn.standings;
  var lastUp=espn.lastUp;

  // Firebase sync
  useEffect(function(){
    if(!_db){setDbSt('error');return;}
    _db.ref('results').on('value',function(s){setResults(s.val()||{});setDbSt('ok');},function(){setDbSt('error');});
  },[]);

  // Auto-save ESPN completed results to Firebase
  useEffect(function(){
    if(!_db)return;
    espnEvents.forEach(function(ev){
      // Save both finished and live scores so they persist
      if(!ev.isFinal&&!ev.isLive&&!ev.isHalf&&ev.fullStatusName!=='STATUS_END_PERIOD'&&ev.fullStatusName!=='STATUS_FULL_TIME')return;
      var m=MATCH_LIST.find(function(m){return m.team_a===ev.homeTeam&&m.team_b===ev.awayTeam;});
      if(!m)return;
      var fk=fbkey(mkey(m));
      // Only overwrite Firebase with final scores (not live, to avoid overwriting with in-progress)
      if(ev.isFinal){
        _db.ref('results/'+fk).set({sa:ev.homeScore,sb:ev.awayScore});
      }
    });
  },[espnEvents]);

  // ESPN score cache — stored in state so React re-renders when scores change
  var s_ec=useState({}); var espnScoreCache=s_ec[0],setEspnScoreCache=s_ec[1];
  var espnCacheRef=React.useRef({});
  React.useEffect(function(){
    var changed=false;
    espnEvents.forEach(function(ev){
      if(!ev.isFinal&&!ev.isLive&&!ev.isHalf)return;
      var m=MATCH_LIST.find(function(m){return m.team_a===ev.homeTeam&&m.team_b===ev.awayTeam;});
      if(!m)return;
      var fk=fbkey(mkey(m));
      var prev=espnCacheRef.current[fk];
      var next={sa:ev.homeScore,sb:ev.awayScore};
      if(!prev||prev.sa!==next.sa||prev.sb!==next.sb){
        espnCacheRef.current[fk]=next;
        changed=true;
      }
    });
    if(changed) setEspnScoreCache(Object.assign({},espnCacheRef.current));
  },[espnEvents]);

  // Merge Firebase + ESPN cache — re-renders when either changes
  var merged=useMemo(function(){
    return Object.assign({},results,espnScoreCache);
  },[results,espnScoreCache]);

  // Scores
  var scores=useMemo(function(){
    var t={};
    RAW.forEach(function(p){t[p.name]={match:0,total:0};});
    MATCH_LIST.forEach(function(m){
      var real=merged[fbkey(mkey(m))];
      if(!real||real.sa===null||real.sb===null)return;
      RAW.forEach(function(p){var g=LOOKUP[p.name][mkey(m)];if(g)t[p.name].match+=calcPts(real,g);});
    });
    Object.keys(t).forEach(function(n){t[n].total=t[n].match;});
    return t;
  },[merged]);

  var ranked=useMemo(function(){
    return Object.entries(scores).sort(function(a,b){return b[1].total-a[1].total;}).map(function(x,i){return{rank:i+1,name:x[0],total:x[1].total,match:x[1].match};});
  },[scores]);

  var completedCount=useMemo(function(){
    return MATCH_LIST.filter(function(m){var r=merged[fbkey(mkey(m))];return r&&r.sa!==null&&r.sb!==null;}).length;
  },[merged]);

  // Today
  var todayStr=useMemo(function(){
    var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
  },[]);




  // Classify matches
  var classifyMatch=function(m){
    var ev=espnEvents.find(function(e){return e.homeTeam===m.team_a&&e.awayTeam===m.team_b;});
    if(ev){
      if(ev.isLive||ev.isHalf)return 'live';
      if(ev.isFinal)return 'done';
    }
    var r=merged[fbkey(mkey(m))];
    if(r&&r.sa!==null)return 'done';
    return 'upcoming';
  };

  // Results tab filtered matches
  var rMatches=useMemo(function(){
    var all=MATCH_LIST;
    if(rFilter==='TODAY') return all.filter(function(m){return m.date===todayStr;});
    if(rFilter==='DONE')  return all.filter(function(m){return classifyMatch(m)==='done'||classifyMatch(m)==='live';}).reverse();
    if(rFilter==='ALL')   return all;
    return all.filter(function(m){return m.grupo===rFilter;});
  },[rFilter,merged,espnEvents,todayStr]);

  // Group by date for results display
  var byDate=useMemo(function(){
    var g={};
    rMatches.forEach(function(m){if(!g[m.date])g[m.date]=[];g[m.date].push(m);});
    return g;
  },[rMatches]);

  // Guesses tab matches
  var gMatches=useMemo(function(){
    var all=MATCH_LIST;
    if(gFilter==='ALL') return all;
    if(gFilter==='DONE') return all.filter(function(m){var s=classifyMatch(m);return s==='done'||s==='live';}).reverse();
    return all.filter(function(m){return m.grupo===gFilter;});
  },[gFilter,merged,espnEvents]);

  // ESPN live/next
  // Keep last known live event so it doesn't flicker when ESPN polls
  var liveCache=React.useRef(null);
  var currentLive=espnEvents.find(function(e){return e.isLive||e.isHalf;});
  if(currentLive) liveCache.current=currentLive;
  var liveNow=currentLive||liveCache.current;

  var nextUp=espnEvents.find(function(e){return e.isPre;})||
             MATCH_LIST.find(function(m){return classifyMatch(m)==='upcoming';});

  // ── LIVE WIDGET (ESPN-style) ─────────────────────────────────────────────
  function TeamBadge(name,logo,size){

    if(code){

        src:'https://flagcdn.com/w40/'+code+'.png',
        style:{width:size+'px',height:Math.round(size*0.75)+'px',objectFit:'cover',borderRadius:3,display:'block'},

      return h('img',{src:logo,style:{width:size+'px',height:size+'px',objectFit:'contain'},alt:name,onError:function(e){e.target.style.display='none';}});

            style:{width:16,height:16,objectFit:'contain'},alt:'FIFA'}),
          h('span',{style:{fontSize:9,color:'#94a3b8',letterSpacing:1,textTransform:'uppercase',fontWeight:600}},

        )
      )
    );

  function NextCard(m){

        // Right: scorers
        h('div',{className:'hdr-right',style:{minWidth:185}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
            h('span',{style:{fontSize:10,color:'#facc15',fontWeight:700,letterSpacing:1}},'⚽ ARTILHEIROS'),
            lastUp?h('span',{style:{fontSize:9,color:'#4a6090'}},lastUp.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})):null
          ),
          scorers.length>0?
            scorers.map(function(s,i){
              return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:6,fontSize:12,marginBottom:4,padding:'4px 6px',background:i===0?'#16243e':'transparent',borderRadius:5}},
                h('span',{style:{color:'#facc15',fontWeight:700,minWidth:14,fontSize:11}},i+1+'.'),
                h('div',{style:{flex:1,minWidth:0}},
                  h('div',{style:{color:'#e2e8f0',fontWeight:600,fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
                    s.name,
                    h('span',{style:{color:'#94a3b8',fontWeight:400,fontSize:10,marginLeft:4}},s.team?'('+s.team.toUpperCase()+')':'')
                  )
                ),
                h('span',{style:{color:'#facc15',fontWeight:800,fontSize:13,minWidth:20,textAlign:'right'}},s.goals+'⚽')
              );
            })
          :h('div',{style:{fontSize:11,color:'#4a6090',padding:'4px 0'}},'Aguardando jogos...'),

        )
      ),

      // LEGEND + TABS
      h('div',{style:{padding:'8px 0 6px',display:'flex',flexWrap:'wrap',gap:6,alignItems:'center',justifyContent:'center',borderTop:'1px solid #16243e'}},
        h('span',{style:{fontSize:10,color:'#64748b',marginRight:2,fontWeight:600,letterSpacing:.5}},'PONTUAÇÃO:'),
        [['#22c55e','5pts','Placar exato'],['#3b82f6','4pts','Vencedor+saldo'],['#f59e0b','2pts','Só vencedor'],['#ef4444','0pts','Errou']].map(function(leg,li){
          return h('div',{key:li,style:{display:'flex',alignItems:'center',gap:4,padding:'2px 8px',background:'#16243e',borderRadius:20,border:'1px solid #1e3050'}},
            h('span',{style:{width:7,height:7,borderRadius:'50%',background:leg[0],display:'inline-block',flexShrink:0}}),
            h('span',{style:{fontSize:10,color:leg[0],fontWeight:700}},leg[1]),
            h('span',{style:{fontSize:10,color:'#64748b'}},leg[2])
          );
        })
      ),
      h('div',{style:{display:'flex',overflowX:'auto',borderTop:'1px solid #16243e',marginTop:0,paddingTop:0}},
        [['ranking','🏅 Ranking'],['guesses','👀 Palpites'],['results','⚽ Resultados'],['groups','🌍 Grupos']].map(function(t){
          return h('button',{key:t[0],className:'tab-btn'+(tab===t[0]?' active':''),onClick:function(){setTab(t[0]);}},t[1]);
        })
      )
    )
  );

  var modal=null;

  return h('div',{style:{fontFamily:"'Segoe UI',system-ui,sans-serif",background:'#0d1b34',minHeight:'100vh',color:'#fff',paddingBottom:40}},
    modal,header,
    h('div',{style:{maxWidth:1200,margin:'0 auto',padding:'18px 16px'}},
      tab==='ranking'?rankingTab:tab==='guesses'?guessesTab:tab==='results'?resultsTab:classTab
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(BolaoApp));
</script>
</body>
</html>

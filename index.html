function mkey(m){return m.grupo+'|'+m.team_a+'|'+m.team_b;}

function getW(a,b){return a>b?'A':b>a?'B':'D';}
function calcPts(real,guess){
  if(!real||!guess)return 0;
  var ra=real.sa,rb=real.sb,ga=guess.sa,gb=guess.sb;
  if(ra===null||rb===null||ga===null||gb===null)return 0;
  if(ra===ga&&rb===gb)return 5;
  if(getW(ra,rb)!==getW(ga,gb))return 0;
  if(Math.abs(ra-rb)===Math.abs(ga-gb))return 4;
  return 2;
}

// ── Mata-mata: mesma régua de pontos da fase de grupos (5/4/2/0) ──────────────
// Bônus de +3pts quando o palpite empata e o participante acerta quem avança
// (real / guess: {sa,sb,who}) — 'who' = 'A' ou 'B', só usado quando sa===sb
function calcPtsKnockout(real,guess){
  if(!real||!guess)return 0;
  var pts=calcPts(real,guess);
  // Bônus de +3pts só vale quando o jogo REAL foi decidido especificamente
  // nos pênaltis (não vale se foi decidido na prorrogação) E o palpite
  // empatou no tempo normal E acertou quem avançou.
  if(real.decidedBy==='penalties'&&guess.sa===guess.sb&&guess.who&&real.who&&guess.who===real.who){
    pts+=3;
  }
  return pts;
}

<script>
var h=React.createElement;
var useState=React.useState;
var useEffect=React.useEffect;
var useMemo=React.useMemo;

// ── ESPN Hook — fetches live scores, standings, AND scorers from goal details ──
function useESPN(){
  var s1=useState([]);   var espnEvents=s1[0],setEvents=s1[1];
  var s2=useState([]);   var scorers=s2[0],setScorers=s2[1];
  var s3=useState({});   var standings=s3[0],setStandings=s3[1];
  var s4=useState(null); var lastUp=s4[0],setLastUp=s4[1];
  var s6=useState([]);   var allScorers=s6[0],setAllScorers=s6[1];

  var fetchScores=useCallback(function(){
    var brt=new Date(Date.now()-3*3600000);
    var tom=new Date(brt.getTime()+86400000);
    var pad=function(n){return String(n).padStart(2,'0');};
    var toStr=function(d){return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());};
    // Fetch full World Cup group stage range to catch any missed finished games
    // ESPN may drop old completed games from day-specific results, so always use full range
    fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=100&dates=20260611-20260628')
    .then(function(r){return r.json();})
    .then(function(d){
      // Build fresh goal map from all events
      var gmap={};
      var evts=(d.events||[]).map(function(e){
        var comp=(e.competitions||[])[0]||{};
        var comps=comp.competitors||[];
        var home=comps.find(function(t){return t.homeAway==='home';})||comps[0]||{};
        var away=comps.find(function(t){return t.homeAway==='away';})||comps[1]||{};
        var st=(comp.status&&comp.status.type)||{};
        var sn=st.name||'';
        var isFin=sn==='STATUS_FINAL'||sn==='STATUS_FULL_TIME'||sn==='STATUS_END_PERIOD';
        var isLv=sn==='STATUS_IN_PROGRESS';
        var isHalf=sn==='STATUS_HALFTIME';
        // Extract goal scorers — det.team only has {id}, so match against home/away to get the name
        (comp.details||[]).forEach(function(det){
          if(!det.scoringPlay||det.shootout)return;
          var ath=(det.athletesInvolved||[])[0];
          if(!ath)return;
          var nm=ath.displayName||ath.fullName||'';
          if(!nm)return;
          var detTeamId=det.team&&det.team.id;
          var teamRaw='';
          if(detTeamId&&home.team&&String(home.team.id)===String(detTeamId)){
            teamRaw=home.team.displayName||'';
          }else if(detTeamId&&away.team&&String(away.team.id)===String(detTeamId)){
            teamRaw=away.team.displayName||'';
          }
          var team=EM[teamRaw]||teamRaw||'';
          if(!gmap[nm])gmap[nm]={name:nm,team:team,goals:0};
          gmap[nm].goals++;
        });
        return{
          id:e.id,
          homeTeam:norm(home.team&&home.team.displayName||''),
          awayTeam:norm(away.team&&away.team.displayName||''),
          homeLogo:(home.team&&home.team.logo)||'',
          awayLogo:(away.team&&away.team.logo)||'',
          homeScore:parseInt(home.score||'0'),
          awayScore:parseInt(away.score||'0'),
          homeWin:!!home.winner,awayWin:!!away.winner,
          clock:(comp.status&&comp.status.displayClock)||'',
          isLive:isLv,isHalf:isHalf,isFinal:isFin,
          isPre:sn==='STATUS_SCHEDULED'||sn==='STATUS_TIMED',
          fullStatusName:sn,date:e.date||''
        };
      });
      setEvents(evts);
      setLastUp(new Date());
      // Update scorers from all completed matches
      var fullList=Object.keys(gmap).map(function(k){return gmap[k];})
        .filter(function(x){return x.goals>0;})
        .sort(function(a,b){return b.goals-a.goals;});
      if(fullList.length){
        setScorers(fullList.slice(0,10));
        setAllScorers(fullList);
      }
      // Auto-save finals to Firebase
      evts.forEach(function(ev){
        if(!ev.isFinal||!_db)return;
        var m=MATCH_LIST.find(function(m){return m.team_a===ev.homeTeam&&m.team_b===ev.awayTeam;});
        if(!m)return;
        _db.ref('results/'+fbkey(mkey(m))).set({sa:ev.homeScore,sb:ev.awayScore});
      });
    }).catch(function(e){console.warn('ESPN:',e);});
  },[]);

  var fetchStandings=useCallback(function(){
    fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings')
    .then(function(r){return r.json();})
    .then(function(d){
      var s={};
      (d.standings||[]).forEach(function(grp){
        var gn=(grp.name||'').replace(/Group /i,'').replace(/Grupo /i,'').trim();
        if(!gn||gn.length>2)return;
        s[gn]=(grp.entries||[]).map(function(e){
          function sv(n){var x=(e.stats||[]).find(function(x){return x.name===n;});return x?x.value:0;}
          return{team:norm(e.team&&e.team.displayName||e.team&&e.team.name||''),logo:e.team&&e.team.logo||'',played:sv('gamesPlayed'),wins:sv('wins'),draws:sv('ties'),losses:sv('losses'),gf:sv('pointsFor'),ga:sv('pointsAgainst'),pts:sv('points')};
        });
      });
      setStandings(s);
    }).catch(function(){});
  },[]);

  useEffect(function(){
    fetchScores();fetchStandings();
    var t1=setInterval(fetchScores,30000);
    var t2=setInterval(fetchStandings,180000);
    return function(){clearInterval(t1);clearInterval(t2);};
  },[]);

  return{espnEvents:espnEvents,scorers:scorers,allScorers:allScorers,standings:standings,lastUp:lastUp};
}


// ── Main App ──────────────────────────────────────────────────────────────────
function BolaoApp(){
  var s1=useState({});      var results=s1[0],setResults=s1[1];
  var s2=useState('ranking'); var tab=s2[0],setTab=s2[1];
  var s3=useState('TODAY'); var rFilter=s3[0],setRFilter=s3[1];
  var s4=useState('ALL');   var gFilter=s4[0],setGFilter=s4[1]; // guesses tab filter
  var s9=useState('ok');    var dbSt=s9[0],setDbSt=s9[1];

  var espn=useESPN();
  var espnEvents=espn.espnEvents;
  var scorers=espn.scorers;
  var allScorers=espn.allScorers;
  var espnStandings=espn.standings;
  var lastUp=espn.lastUp;

  // Firebase sync
  useEffect(function(){
    if(!_db){setDbSt('error');return;}
    _db.ref('results').on('value',function(s){setResults(s.val()||{});setDbSt('ok');},function(){setDbSt('error');});
  },[]);

  // ── Persistent score cache: accumulates ALL ESPN scores across every poll ──
  // Uses useRef so it never resets between renders; state copy triggers re-render
  var espnCacheRef=React.useRef({});
  var s_ec=useState({}); var espnScoreCache=s_ec[0],setEspnScoreCache=s_ec[1];

  React.useEffect(function(){
    if(!espnEvents.length)return;
    var changed=false;

    espnEvents.forEach(function(ev){
      // Accept live, half-time AND finished scores
      if(!ev.isFinal&&!ev.isLive&&!ev.isHalf)return;
      var m=MATCH_LIST.find(function(m){
        return m.team_a===ev.homeTeam&&m.team_b===ev.awayTeam;
      });
      if(!m)return;
      var fk=fbkey(mkey(m));
      var prev=espnCacheRef.current[fk];
      var next={sa:ev.homeScore,sb:ev.awayScore};

      // Only update cache when score actually changes
      if(!prev||prev.sa!==next.sa||prev.sb!==next.sb){
        espnCacheRef.current[fk]=next;
        changed=true;

        // Immediately persist FINAL scores to Firebase so they survive page reload
        if(ev.isFinal&&_db){
          _db.ref('results/'+fk).set(next);
        }
      }
    });

    // Trigger React re-render (scores / ranking / palpites all update)
    if(changed) setEspnScoreCache(Object.assign({},espnCacheRef.current));
  },[espnEvents]);

  // Merge: Firebase (persistent) overrides nothing; ESPN cache adds live+final scores
  // espnCacheRef.current persists across polls — scores never disappear between polls
  var merged=useMemo(function(){
    return Object.assign({},results,espnScoreCache);
  },[results,espnScoreCache]);

  // Scores
  var scores=useMemo(function(){
    var t={};
    RAW.forEach(function(p){t[p.name]={match:0,group:0,total:0,c5:0,c4:0,c2:0,c0:0};});
    MATCH_LIST.forEach(function(m){
      var real=merged[fbkey(mkey(m))];
      if(!real||real.sa===null||real.sb===null)return;
      RAW.forEach(function(p){
        // Skip past matches for participants with a "since" date
        var pObj=RAW.find(function(x){return x.name===p.name;});
        if(pObj&&pObj.since){
          // Compare dd/mm dates: skip if match date < since date
          var md=m.date; // "11/06"
          var sd=pObj.since; // "14/06"
          var mDay=parseInt(md),mMon=parseInt(md.slice(3));
          var sDay=parseInt(sd),sMon=parseInt(sd.slice(3));
          if(mMon<sMon||(mMon===sMon&&mDay<sDay))return;
        }
        var g=LOOKUP[p.name][mkey(m)];
        if(g){
          var pts=calcPts(real,g);
          t[p.name].match+=pts;
          if(pts===5)t[p.name].c5++;
          else if(pts===4)t[p.name].c4++;
          else if(pts===2)t[p.name].c2++;
          else t[p.name].c0++;
        }
      });
    });

    // ── Bonus: +5 pts for correctly guessing the group LEADER, +5 for the RUNNER-UP ──
    // Uses real standings (live/partial, based on completed matches) vs each
    // participant's simulated standings (based purely on their own guesses).
    GROUPS.forEach(function(g){
      var realRows=(Object.keys(espnStandings).length>0&&espnStandings[g]&&espnStandings[g].length>0)
        ? espnStandings[g]
        : computeGroupRows(g,function(m){return merged[fbkey(mkey(m))];});
      var realLeader =realRows[0]&&realRows[0].team;
      var realRunnerUp=realRows[1]&&realRows[1].team;
      if(!realLeader&&!realRunnerUp)return; // no data yet for this group

      RAW.forEach(function(p){
        var pRows=computeGroupRows(g,function(m){return LOOKUP[p.name][mkey(m)];});
        var pLeader =pRows[0]&&pRows[0].team;
        var pRunnerUp=pRows[1]&&pRows[1].team;
        if(realLeader&&pLeader&&pLeader===realLeader)     t[p.name].group+=5;
        if(realRunnerUp&&pRunnerUp&&pRunnerUp===realRunnerUp) t[p.name].group+=5;
      });
    });

    Object.keys(t).forEach(function(n){t[n].total=t[n].match+t[n].group;});
    return t;
  },[merged,espnStandings]);

  var ranked=useMemo(function(){
    return Object.entries(scores).sort(function(a,b){return b[1].total-a[1].total;}).map(function(x,i){return{rank:i+1,name:x[0],total:x[1].total,match:x[1].match,group:x[1].group,c5:x[1].c5,c4:x[1].c4,c2:x[1].c2,c0:x[1].c0};});
  },[scores]);

  var completedCount=useMemo(function(){
    return MATCH_LIST.filter(function(m){var r=merged[fbkey(mkey(m))];return r&&r.sa!==null&&r.sb!==null;}).length;
  },[merged]);

  // Today
  var todayStr=useMemo(function(){
    var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
  },[]);




  // Classify matches
  var classifyMatch=function(m){
    var ev=espnEvents.find(function(e){return e.homeTeam===m.team_a&&e.awayTeam===m.team_b;});
    if(ev){
      if(ev.isLive||ev.isHalf)return 'live';
      if(ev.isFinal)return 'done';
    }
    var r=merged[fbkey(mkey(m))];
    if(r&&r.sa!==null)return 'done';
    return 'upcoming';
  };

  // Results tab filtered matches
  var rMatches=useMemo(function(){
    var all=MATCH_LIST;
    if(rFilter==='TODAY') return all.filter(function(m){return m.date===todayStr;});
    if(rFilter==='DONE')  return all.filter(function(m){return classifyMatch(m)==='done'||classifyMatch(m)==='live';}).reverse();
    if(rFilter==='ALL')   return all;
    return all.filter(function(m){return m.grupo===rFilter;});
  },[rFilter,merged,espnEvents,todayStr]);

  // Group by date for results display
  var byDate=useMemo(function(){
    var g={};
    rMatches.forEach(function(m){if(!g[m.date])g[m.date]=[];g[m.date].push(m);});
    return g;
  },[rMatches]);

  // Guesses tab matches
  var gMatches=useMemo(function(){
    var all=MATCH_LIST;
    if(gFilter==='ALL') return all;
    if(gFilter==='DONE') return all.filter(function(m){var s=classifyMatch(m);return s==='done'||s==='live';}).reverse();
    return all.filter(function(m){return m.grupo===gFilter;});

  // Keep last known live event so it doesn't flicker when ESPN polls
  var liveCache=React.useRef(null);
  var currentLive=espnEvents.find(function(e){return e.isLive||e.isHalf;});
  if(currentLive) liveCache.current=currentLive;
  var liveNow=currentLive||liveCache.current;

  // nextUp removed — NextCard is now offline

  // ── LIVE WIDGET (ESPN-style) ─────────────────────────────────────────────
  function TeamBadge(name,logo,size){
    var code=FLAG_CODES[name];
    // Always use flagcdn w40 (guaranteed valid) scaled via CSS — matches reference image exactly
    if(code){
      return h('img',{

          if(logo&&logo.length>0){e.target.src=logo;e.target.style.height=size+'px';e.target.style.objectFit='contain';}
          else{e.target.style.display='none';}

      return h('img',{src:logo,style:{width:size+'px',height:size+'px',objectFit:'contain'},alt:name,onError:function(e){e.target.style.display='none';}});

      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},

          isLv?h('span',{style:{width:7,height:7,borderRadius:'50%',background:'#22c55e',display:'inline-block',animation:'blink 1s infinite'}}):null,

      ),
      // Main score row
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}},
        // Home team
        h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:6,flex:1,minWidth:0}},

  function NextCard(){
    // Purely offline: find next upcoming match from SCHEDULE based on current datetime
    var now=new Date();
    var todayDD=String(now.getDate()).padStart(2,'0');
    var todayMM=String(now.getMonth()+1).padStart(2,'0');
    var todayHH=now.getHours();
    var todayMin=now.getMinutes();

    // Find next match from SCHEDULE that hasn't started yet
    var nextMatch=null;
    for(var i=0;i<SCHEDULE.length;i++){
      var s=SCHEDULE[i];
      var parts=s.date.split('/'); // "13/06" → ["13","06"]
      var sDay=parseInt(parts[0]),sMon=parseInt(parts[1]);
      var nowDay=parseInt(todayDD),nowMon=parseInt(todayMM);

      var timeParts=s.time.replace('h',':').split(':');
      var sHH=parseInt(timeParts[0]);
      var sMin=timeParts[1]?parseInt(timeParts[1]):0;

      var matchInFuture=false;
      if(sMon>nowMon) matchInFuture=true;
      else if(sMon===nowMon&&sDay>nowDay) matchInFuture=true;
      else if(sMon===nowMon&&sDay===nowDay&&(sHH>todayHH||(sHH===todayHH&&sMin>todayMin))) matchInFuture=true;

      // Also skip if we already have a result stored for this match
      var mk=s.g+'|'+s.ta+'|'+s.tb;
      var fk=mk.replace(/[.#$[\]|]/g,'_');
      var hasResult=merged[fk]&&merged[fk].sa!==null;

      if(matchInFuture&&!hasResult){nextMatch=s;break;}
    }

    if(!nextMatch)return h('div',{style:{fontSize:13,color:'#64748b',padding:'20px',textAlign:'center'}},'🏆 Fase de grupos concluída');

    var ta=nextMatch.ta, tb=nextMatch.tb;

            onClick:function(){
              if(isOpen){ setKoPickMatch({id:id,ta:ta,tb:tb}); setKoSelectedName(''); setKoGuessA(''); setKoGuessB(''); setKoGuessWho(''); setKoConfirming(false); setKoAuthed(false); setKoPassInput(''); setKoPassErr(''); }
              else if(isConfirmed&&guessCount>0){ setKoViewMatch(koViewMatch===id?null:id); }
            },
            style:{
              display:'flex',alignItems:'center',justifyContent:'center',gap:5,
              padding:'5px 8px',fontSize:10,fontWeight:700,
              cursor:(isOpen||(isConfirmed&&guessCount>0))?'pointer':'default',
              background:isOpen?'#3d2f00':'#0d1b34',
              color:isOpen?'#facc15':isConfirmed?'#64748b':'#3a4760',
              borderTop:'1px solid #243356'
            }
          },
            isOpen?'🔓 Palpitar':isConfirmed?(guessCount>0?'🔒 Ver palpites':'🔒 Encerrado'):'🔒 Aguardando confronto',
            isConfirmed?h('span',{style:{marginLeft:4,color:'#4a6090',fontWeight:400}},'('+guessCount+'/'+RAW.length+')'):null
          ),
          (koViewMatch===id&&!isOpen&&guessCount>0)?h('div',{style:{background:'#0d1b34',padding:'6px 8px',borderTop:'1px solid #243356',maxHeight:160,overflowY:'auto'}},
            Object.keys(myGuesses).sort().map(function(nm){
              var g=myGuesses[nm];
              return h('div',{key:nm,style:{fontSize:10,color:'#94a3b8',display:'flex',justifyContent:'space-between',padding:'2px 0'}},
                h('span',null,nm),
                h('span',{style:{color:'#facc15',fontWeight:700}},g.sa+'×'+g.sb+(g.who?' ('+(g.who==='A'?labelA:labelB)+')':''))
              );
            })
          ):null
        );
      }

      function r32Card(id){var r=r32Resolved[id];return MatchCard(id,r.ta,r.tb,r.labelA,r.labelB,r.date,r.time);}
      function r16Card(id){var m=R16_PAIRS.find(function(x){return x.id===id;});return MatchCard(id,null,null,'Venc. '+m.a,'Venc. '+m.b,m.date,m.time);}
      function qfCard(id){var m=QF_PAIRS.find(function(x){return x.id===id;});return MatchCard(id,null,null,'Venc. '+m.a,'Venc. '+m.b,m.date,m.time);}
      function sfCard(id){var m=SF_PAIRS.find(function(x){return x.id===id;});return MatchCard(id,null,null,'Venc. '+m.a,'Venc. '+m.b,m.date,m.time);}

      // Mapa pai→filho para desenhar as linhas de conexão
      var parentMap={};
      R16_PAIRS.forEach(function(m){parentMap[m.id]=[m.a,m.b];});
      QF_PAIRS.forEach(function(m){parentMap[m.id]=[m.a,m.b];});
      SF_PAIRS.forEach(function(m){parentMap[m.id]=[m.a,m.b];});
      parentMap['Final']=['M101','M102'];
      parentMap["3º Lugar"]=['M101','M102'];

      React.useEffect(function(){
        var raf=requestAnimationFrame(function(){
          var cont=bracketContainerRef.current;
          if(!cont)return;
          var contRect=cont.getBoundingClientRect();
          var lines=[];
          Object.keys(parentMap).forEach(function(childId){
            var childEl=bracketCardRefs.current[childId];
            if(!childEl)return;
            var cr=childEl.getBoundingClientRect();
            var childY=cr.top+cr.height/2-contRect.top+cont.scrollTop;
            parentMap[childId].forEach(function(parentId){
              var parentEl=bracketCardRefs.current[parentId];
              if(!parentEl)return;
              var pr=parentEl.getBoundingClientRect();
              var parentY=pr.top+pr.height/2-contRect.top+cont.scrollTop;
              // Lado esquerdo: linha sai da direita do pai, entra na esquerda do filho
              // Lado direito: linha sai da esquerda do pai, entra na direita do filho
              var parentIsRight=pr.left-contRect.left>cr.left-contRect.left;
              var parentX=(parentIsRight?pr.left:pr.right)-contRect.left+cont.scrollLeft;
              var childX=(parentIsRight?cr.right:cr.left)-contRect.left+cont.scrollLeft;
              lines.push({x1:parentX,y1:parentY,x2:childX,y2:childY});
            });
          });
          setBracketLines(lines);
        });
        return function(){cancelAnimationFrame(raf);};
      },[merged,espnStandings,koGuesses]);

      // ── Coluna genérica para uma metade do chaveamento ──
      function HalfColumn(title,cards){
        return h('div',{style:{display:'flex',flexDirection:'column',gap:14,justifyContent:'space-around',flex:1}},
          h('div',{style:{fontSize:10,fontWeight:700,color:'#facc15',textAlign:'center',marginBottom:4,textTransform:'uppercase',letterSpacing:1}},title),
          h('div',{style:{display:'flex',flexDirection:'column',gap:18,flex:1,justifyContent:'space-around'}},cards)
        );
      }

      var leftR32Cards=LEFT_R32.map(r32Card);
      var leftR16Cards=LEFT_R16.map(r16Card);
      var leftQfCards=LEFT_QF.map(qfCard);
      var leftSfCard=sfCard('M101');

      var rightR32Cards=RIGHT_R32.map(r32Card);
      var rightR16Cards=RIGHT_R16.map(r16Card);
      var rightQfCards=RIGHT_QF.map(qfCard);
      var rightSfCard=sfCard('M102');

      var centerCards=h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:24,minWidth:190,padding:'0 8px'}},
        h('div',{style:{fontSize:13,fontWeight:800,color:'#facc15',textAlign:'center',letterSpacing:2,textTransform:'uppercase'}},'🏆 Final'),
        MatchCard('Final',null,null,'Venc. M101','Venc. M102','19/07','16h'),
        h('div',{style:{fontSize:10,fontWeight:700,color:'#94a3b8',textAlign:'center',letterSpacing:1,marginTop:8}},'3º Lugar'),
        MatchCard('3º Lugar',null,null,'Perdedor M101','Perdedor M102','18/07','18h')
      );

      return h('div',{
          ref:function(el){bracketContainerRef.current=el;},
          style:{overflowX:'auto',paddingBottom:10,position:'relative'}
        },
        h('svg',{
          style:{position:'absolute',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:1}
        },
          bracketLines.map(function(ln,i){
            var midX=(ln.x1+ln.x2)/2;
            var d='M '+ln.x1+' '+ln.y1+' C '+midX+' '+ln.y1+', '+midX+' '+ln.y2+', '+ln.x2+' '+ln.y2;
            return h('path',{key:i,d:d,stroke:'#ffffff',strokeWidth:1.5,fill:'none',opacity:.4});
          })
        ),
        h('div',{style:{display:'flex',gap:12,minWidth:1500,position:'relative',zIndex:2,alignItems:'stretch'}},
          // ── Metade esquerda: Rodada32 → Oitavas → Quartas → Semi ──
          HalfColumn('Rodada de 32',leftR32Cards),
          HalfColumn('Oitavas',leftR16Cards),
          HalfColumn('Quartas',leftQfCards),
          HalfColumn('Semi',[leftSfCard]),
          // ── Centro: Final + 3º lugar ──
          centerCards,
          // ── Metade direita: Semi ← Quartas ← Oitavas ← Rodada32 ──
          HalfColumn('Semi',[rightSfCard]),
          HalfColumn('Quartas',rightQfCards),
          HalfColumn('Oitavas',rightR16Cards),
          HalfColumn('Rodada de 32',rightR32Cards)
        )
      );
    })()
  );



  // ── Modal de palpite do mata-mata ───────────────────────────────────────
  var koModal=koPickMatch?h('div',{
    style:{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16},
    onClick:function(e){if(e.target===e.currentTarget)setKoPickMatch(null);}
  },
    h('div',{style:{background:'#1a2d52',borderRadius:14,padding:20,width:'100%',maxWidth:360,border:'1px solid #3a5490'}},
      h('div',{style:{fontSize:14,fontWeight:800,color:'#facc15',marginBottom:4}},'Palpite — '+koPickMatch.id),
      h('div',{style:{fontSize:12,color:'#94a3b8',marginBottom:16,display:'flex',alignItems:'center',gap:6}},
        flagImg(koPickMatch.ta&&koPickMatch.ta.team,16),koPickMatch.ta&&koPickMatch.ta.team,
        h('span',{style:{color:'#4a6090'}},'×'),
        flagImg(koPickMatch.tb&&koPickMatch.tb.team,16),koPickMatch.tb&&koPickMatch.tb.team
      ),

      !koSelectedName?h('div',null,
        h('div',{style:{fontSize:12,color:'#94a3b8',marginBottom:8}},'Quem é você?'),
        h('select',{
          value:koSelectedName,
          onChange:function(e){
            var name=e.target.value;
            setKoSelectedName(name);
            // Pré-carrega o palpite já existente, se houver, para edição
            var existing=(koGuesses[koPickMatch.id]||{})[name];
            if(existing){
              setKoGuessA(String(existing.sa));
              setKoGuessB(String(existing.sb));
              setKoGuessWho(existing.who||'');
            }else{
              setKoGuessA('');setKoGuessB('');setKoGuessWho('');
            }
          },
          style:{width:'100%',background:'#0d1b34',border:'1px solid #3a5490',borderRadius:8,color:'#fff',fontSize:14,padding:'10px 12px',fontFamily:'inherit'}
        },
          h('option',{value:''},'— Selecione seu nome —'),
          RAW.map(function(p){
            var already=koGuesses[koPickMatch.id]||{};
            var has=!!already[p.name];
            return h('option',{key:p.name,value:p.name},p.name+(has?' ✓ (já palpitou)':''));
          })
        ),
        (function(){
          var already=koGuesses[koPickMatch.id]||{};
          var pendingCount=RAW.length-Object.keys(already).length;
          return h('div',{style:{fontSize:11,color:'#64748b',marginTop:8}},pendingCount+' de '+RAW.length+' ainda não palpitaram · pode editar até 30min antes do jogo');
        })()
      ):
      (koSelectedName&&!koAuthed)?h('div',null,
        h('div',{style:{fontSize:12,color:'#94a3b8',marginBottom:8}},'Senha de ',h('strong',{style:{color:'#facc15'}},koSelectedName)),
        h('input',{
          type:'password',inputMode:'numeric',maxLength:4,
          value:koPassInput,
          placeholder:'Digite sua senha de 4 dígitos',
          onChange:function(e){setKoPassInput(e.target.value);setKoPassErr('');},
          onKeyDown:function(e){
            if(e.key==='Enter'){
              if(KO_PASSWORDS[koSelectedName]===koPassInput){setKoAuthed(true);setKoPassErr('');}
              else setKoPassErr('Senha incorreta. Tente novamente.');
            }
          },
          style:{width:'100%',background:'#0d1b34',border:'1px solid '+(koPassErr?'#ef4444':'#3a5490'),borderRadius:8,color:'#fff',fontSize:16,padding:'10px 12px',fontFamily:'inherit',letterSpacing:4,textAlign:'center'}
        }),
        koPassErr?h('div',{style:{color:'#ef4444',fontSize:11,marginTop:6}},koPassErr):null,
        h('div',{style:{display:'flex',gap:8,marginTop:14}},
          h('button',{onClick:function(){setKoSelectedName('');setKoPassInput('');setKoPassErr('');},style:{flex:1,padding:'10px',background:'#243356',border:'none',borderRadius:8,color:'#94a3b8',fontWeight:600,cursor:'pointer',fontSize:13,fontFamily:'inherit'}},'← Voltar'),
          h('button',{
            onClick:function(){
              if(KO_PASSWORDS[koSelectedName]===koPassInput){setKoAuthed(true);setKoPassErr('');}
              else setKoPassErr('Senha incorreta. Tente novamente.');
            },
            style:{flex:1,padding:'10px',background:'#facc15',border:'none',borderRadius:8,color:'#0d1b34',fontWeight:800,cursor:'pointer',fontSize:13,fontFamily:'inherit'}
          },'Entrar')
        )
      ):
      !koConfirming?h('div',null,
        h('div',{style:{fontSize:12,color:'#94a3b8',marginBottom:10}},'Palpite de ',h('strong',{style:{color:'#facc15'}},koSelectedName)),
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:12,justifyContent:'center'}},
          h('input',{type:'number',min:0,max:20,value:koGuessA,
            onChange:function(e){setKoGuessA(e.target.value);},
            style:{width:60,textAlign:'center',background:'#0d1b34',border:'1px solid #3a5490',borderRadius:8,color:'#facc15',fontWeight:800,fontSize:20,padding:'8px 4px'}}),
          h('span',{style:{color:'#64748b',fontSize:16}},'×'),
          h('input',{type:'number',min:0,max:20,value:koGuessB,
            onChange:function(e){setKoGuessB(e.target.value);},
            style:{width:60,textAlign:'center',background:'#0d1b34',border:'1px solid #3a5490',borderRadius:8,color:'#facc15',fontWeight:800,fontSize:20,padding:'8px 4px'}})
        ),
        (koGuessA!==''&&koGuessB!==''&&koGuessA===koGuessB)?h('div',{style:{marginBottom:12}},
          h('div',{style:{fontSize:11,color:'#94a3b8',marginBottom:6,textAlign:'center'}},'Empate — quem avança nos pênaltis?'),
          h('div',{style:{display:'flex',gap:8}},
            h('button',{onClick:function(){setKoGuessWho('A');},style:{flex:1,padding:'8px',borderRadius:8,border:'1px solid '+(koGuessWho==='A'?'#facc15':'#3a5490'),background:koGuessWho==='A'?'#3d2f00':'#16243e',color:koGuessWho==='A'?'#facc15':'#94a3b8',fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit'}},koPickMatch.ta&&koPickMatch.ta.team),
            h('button',{onClick:function(){setKoGuessWho('B');},style:{flex:1,padding:'8px',borderRadius:8,border:'1px solid '+(koGuessWho==='B'?'#facc15':'#3a5490'),background:koGuessWho==='B'?'#3d2f00':'#16243e',color:koGuessWho==='B'?'#facc15':'#94a3b8',fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit'}},koPickMatch.tb&&koPickMatch.tb.team)
          )
        ):null,
        h('div',{style:{display:'flex',gap:8,marginTop:16}},
          h('button',{onClick:function(){setKoPickMatch(null);},style:{flex:1,padding:'10px',background:'#243356',border:'none',borderRadius:8,color:'#94a3b8',fontWeight:600,cursor:'pointer',fontSize:13,fontFamily:'inherit'}},'Cancelar'),
          h('button',{
            disabled:koGuessA===''||koGuessB===''||(koGuessA===koGuessB&&!koGuessWho),
            onClick:function(){setKoConfirming(true);},
            style:{flex:1,padding:'10px',background:(koGuessA===''||koGuessB===''||(koGuessA===koGuessB&&!koGuessWho))?'#3a3f4a':'#facc15',border:'none',borderRadius:8,color:'#0d1b34',fontWeight:800,cursor:'pointer',fontSize:13,fontFamily:'inherit'}
          },'Continuar')
        )
      ):
      h('div',null,
        h('div',{style:{background:'#052e16',border:'1px solid #22c55e',borderRadius:8,padding:'12px',marginBottom:14,fontSize:12,color:'#86efac'}},
          '✅ Você pode editar este palpite quantas vezes quiser até ',
          h('strong',null,'30 minutos antes do início do jogo'),
          '. Confira o palpite abaixo antes de salvar.'
        ),
        h('div',{style:{textAlign:'center',fontSize:24,fontWeight:800,color:'#facc15',marginBottom:14}},
          koGuessA+' × '+koGuessB,
          (koGuessA===koGuessB)?h('div',{style:{fontSize:11,color:'#94a3b8',marginTop:6,fontWeight:400}},'Avança: '+(koGuessWho==='A'?(koPickMatch.ta&&koPickMatch.ta.team):(koPickMatch.tb&&koPickMatch.tb.team))):null
        ),
        h('div',{style:{display:'flex',gap:8}},
          h('button',{onClick:function(){setKoConfirming(false);},style:{flex:1,padding:'10px',background:'#243356',border:'none',borderRadius:8,color:'#94a3b8',fontWeight:600,cursor:'pointer',fontSize:13,fontFamily:'inherit'}},'Voltar'),
          h('button',{
            onClick:function(){
              saveKoGuess(koPickMatch.id,koSelectedName,parseInt(koGuessA),parseInt(koGuessB),koGuessWho||null);
              setKoPickMatch(null);
            },
            style:{flex:1,padding:'10px',background:'#22c55e',border:'none',borderRadius:8,color:'#052e16',fontWeight:800,cursor:'pointer',fontSize:13,fontFamily:'inherit'}
          },(koGuesses[koPickMatch.id]&&koGuesses[koPickMatch.id][koSelectedName])?'✅ Salvar edição':'✅ Salvar palpite')
        )
      )
    )
  ):null;

  // ── SCORERS (ARTILHEIROS) TAB ───────────────────────────────────────────
  var scorersTab=h('div',null,
    h('div',{style:{marginBottom:14,fontSize:12,color:'#94a3b8',display:'flex',alignItems:'center',gap:6}},
      h('span',{style:{width:8,height:8,borderRadius:'50%',background:'#ef4444',display:'inline-block',animation:'pulse 1.5s infinite'}}),
      'Artilheiros atualizados em tempo real',
      lastUp?h('span',{style:{marginLeft:8,color:'#4a6090'}},'• '+lastUp.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})):null
    ),
    (!allScorers||allScorers.length===0)
      ?h('div',{style:{textAlign:'center',color:'#64748b',padding:'60px 0',fontSize:14}},'⚽ Nenhum gol registrado ainda')
      :h('div',{style:{background:'#1a2d52',borderRadius:12,border:'1px solid #243356',overflow:'hidden'}},
          allScorers.map(function(s,i){
            return h('div',{key:i,style:{
              display:'flex',alignItems:'center',gap:10,padding:'10px 16px',
              borderBottom:i<allScorers.length-1?'1px solid #243356':'none',
              background:i===0?'#1c1a00':i===1?'#16243e':i===2?'#1a1e2e':'transparent'
            }},
              h('span',{style:{
                color:i<3?'#facc15':'#64748b',fontWeight:800,minWidth:28,fontSize:14,textAlign:'center'
              }},i+1+'.'),
              flagImg(s.team,24),
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{color:'#e2e8f0',fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},s.name),
                h('div',{style:{color:'#94a3b8',fontWeight:400,fontSize:11,marginTop:1}},s.team?s.team.toUpperCase():'')
              ),
              h('span',{style:{color:'#facc15',fontWeight:800,fontSize:18,minWidth:30,textAlign:'right'}},s.goals),
              h('span',{style:{fontSize:14,color:'#facc15',marginLeft:2}},'⚽')
            );
          })
        )
  );

  // ── HEADER ──────────────────────────────────────────────────────────────
  var header=h('div',{style:{background:'linear-gradient(135deg,#1a3a8a 0%,#0d1b34 100%)',borderBottom:'2px solid #facc15'}},
    h('div',{style:{maxWidth:1200,margin:'0 auto',padding:'14px 20px 0'}},
      h('div',{className:'hdr-top',style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,flexWrap:'wrap'}},

        // Left: title
        h('div',{className:'hdr-left',style:{minWidth:160}},
          h('div',{style:{fontSize:9,color:'#facc15',letterSpacing:3,textTransform:'uppercase',marginBottom:2}},'Copa do Mundo 2026'),
          h('div',{style:{fontSize:20,fontWeight:800,marginBottom:2}},'🏆 Bolão — Italy'),
          h('div',{style:{fontSize:11,color:'#94a3b8'}},completedCount+'/'+MATCH_LIST.length+' jogos  •  '+RAW.length+' participantes'),
          dbSt==='error'?h('div',{style:{fontSize:10,color:'#fca5a5',marginTop:4}},'⚠️ Sem conexão'):null,
          countdownStr?h('div',{style:{marginTop:8,padding:'6px 10px',background:'#1a2d52',border:'1px solid #facc1560',borderRadius:8,display:'inline-block'}},
            h('div',{style:{fontSize:8,color:'#94a3b8',letterSpacing:1,textTransform:'uppercase',marginBottom:2}},'⏳ Fecha o próximo palpite em'),
            h('div',{style:{fontSize:14,fontWeight:800,color:'#facc15',fontFamily:'monospace'}},countdownStr)
          ):null
        ),

        // Center: LIVE on top (mobile stacks vertically), NEXT below
        h('div',{className:'hdr-center',style:{flex:1,display:'flex',flexDirection:'column',gap:8,alignItems:'stretch',minWidth:260,maxWidth:900}},
          h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}},
            liveNow?LiveCard(liveNow):null,
            NextCard()
          )
        ),

      ),

      // LEGEND + TABS
      h('div',{style:{padding:'8px 0 6px',display:'flex',flexWrap:'wrap',gap:6,alignItems:'center',justifyContent:'center',borderTop:'1px solid #16243e'}},
        h('span',{style:{fontSize:10,color:'#64748b',marginRight:2,fontWeight:600,letterSpacing:.5}},'PONTUAÇÃO:'),
        [['#22c55e','5pts','Placar exato'],['#3b82f6','4pts','Vencedor+saldo'],['#f59e0b','2pts','Só vencedor'],['#ef4444','0pts','Errou'],['#3b82f6','+5pts','Acertou líder/vice do grupo']].map(function(leg,li){
          return h('div',{key:li,style:{display:'flex',alignItems:'center',gap:4,padding:'2px 8px',background:'#16243e',borderRadius:20,border:'1px solid #1e3050'}},
            h('span',{style:{width:7,height:7,borderRadius:'50%',background:leg[0],display:'inline-block',flexShrink:0}}),
            h('span',{style:{fontSize:10,color:leg[0],fontWeight:700}},leg[1]),
            h('span',{style:{fontSize:10,color:'#64748b'}},leg[2])
          );
        })
      ),
      h('div',{style:{display:'flex',overflowX:'auto',borderTop:'1px solid #16243e',marginTop:0,paddingTop:0}},
        [['ranking','🏅 Ranking'],['guesses','👀 Palpites'],['results','⚽ Resultados'],['scorers','👟 Artilheiros'],['groups','🌍 Grupos'],['bracket','🏆 Mata-Mata']].map(function(t){
          return h('button',{key:t[0],className:'tab-btn'+(tab===t[0]?' active':''),onClick:function(){setTab(t[0]);}},t[1]);
        })
      )
    )
  );

  var modal=null;

  return h('div',{style:{fontFamily:"'Segoe UI',system-ui,sans-serif",background:'#0d1b34',minHeight:'100vh',color:'#fff',paddingBottom:40}},
    modal,koModal,header,
    h('div',{style:{maxWidth:1200,margin:'0 auto',padding:'18px 16px'}},
      tab==='ranking'?rankingTab:tab==='guesses'?guessesTab:tab==='results'?resultsTab:tab==='scorers'?scorersTab:tab==='bracket'?bracketTab:classTab
    )
  );
}

window.addEventListener('load', function() {
  try {
    var root = document.getElementById('root');
    if(!root) { console.error('No #root element'); return; }
    if(typeof React === 'undefined') { root.innerHTML = '<div style="color:#fff;padding:20px">Erro: React não carregou. Verifique sua conexão.</div>'; return; }
    ReactDOM.createRoot(root).render(React.createElement(BolaoApp));
  } catch(e) {
    console.error('App init error:', e);
    document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:20px;font-family:sans-serif"><h3>Erro ao inicializar</h3><pre>'+e.message+'</pre></div>';
  }
});
</script>
</body>
</html>
